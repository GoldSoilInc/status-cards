<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIM Outreach — GoldSoil Status</title>
  <link rel="stylesheet" href="shared/brand.css">
  <script src="shared/sheet-loader.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    // ============================================
    // LIM OUTREACH TEAM CARD
    // ============================================
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMUBPWS464Rq_ID_Zjoj-PU5QuDeIj2PK6pSKV22rEZ8_0_zxjYagl4SYM3TZckmIkaxhyr_QtyUk9/pub?gid=1101423418&single=true&output=csv";

    const TEAM_NAME = "Land Intake Team";
    const TEAM_LEAD = "Juan";

    // Render flags section with editable textbox
    function renderFlagsWithInput(defaultText) {
      const text = defaultText && defaultText.trim() ? defaultText : 'None right now.';
      return `
        <div class="flags" style="position: relative;">
          <div class="flag-label">⚑ FLAGS / NEEDS ANSHUL</div>
          <div class="flag-body" id="flag-display">${text}</div>
          <textarea id="flag-input" placeholder="Click here to edit flags before screenshotting..."
            style="display: none; width: 100%; min-height: 60px; font-family: var(--font-body); font-size: 12px; color: var(--gs-text); line-height: 1.5; border: 1px solid var(--gs-gold); border-radius: 4px; padding: 8px; resize: vertical; box-sizing: border-box;"></textarea>
          <button onclick="toggleFlagEdit()" id="flag-edit-btn"
            style="position: absolute; top: 8px; right: 12px; background: var(--gs-dark-green); color: var(--gs-gold); border: none; padding: 4px 10px; border-radius: 4px; font-family: var(--font-body); font-size: 10px; font-weight: bold; cursor: pointer;">EDIT</button>
        </div>
      `;
    }

    // Toggle between display and edit mode for flags
    function toggleFlagEdit() {
      const display = document.getElementById('flag-display');
      const input = document.getElementById('flag-input');
      const btn = document.getElementById('flag-edit-btn');
      if (input.style.display === 'none') {
        input.value = display.textContent.trim();
        display.style.display = 'none';
        input.style.display = 'block';
        btn.textContent = 'SAVE';
        input.focus();
      } else {
        const newText = input.value.trim() || 'None right now.';
        display.textContent = newText;
        display.style.display = 'block';
        input.style.display = 'none';
        btn.textContent = 'EDIT';
      }
    }

    // Set true by renderCard when the qualified target is hit; gates the confetti.
    let GOALS_MET = false;

    function renderCard(data) {
      const agents = parseAgents(data, ['martina', 'maryam', 'ahmed', 'juan']);

      const qualified = num(data, 'qualified_total');
      const target = num(data, 'qualified_target', 30);
      GOALS_MET = qualified >= target;
      const sourced = num(data, 'sourced_total');
      const phoneQ = num(data, 'phone_q');
      const textQ = num(data, 'text_q');
      const qualifyRate = sourced > 0 ? ((qualified / sourced) * 100).toFixed(1) : '0.0';
      const phonePct = qualified > 0 ? Math.round((phoneQ / qualified) * 100) : 0;
      const textPct = qualified > 0 ? Math.round((textQ / qualified) * 100) : 0;

      // Hero block: progress vs target
      const isEOD = getCurrentTimeSlot() === '5pm';
      const overUnder = qualified - target;
      const pctToTarget = target > 0 ? Math.round((qualified / target) * 100) : 0;
      let badgeText;
      if (isEOD) {
        badgeText = overUnder >= 0 ? `✓ TARGET +${overUnder}` : `${overUnder} SHORT`;
      } else {
        badgeText = `${pctToTarget}% TO TARGET`;
      }

      const topCounties = parseTopCounties(data);

      return wrapCard(`
        ${renderHeader(TEAM_NAME, TEAM_LEAD)}
        ${renderTimeStrip(getCurrentTimeSlot())}

        <div class="kpi-strip" style="grid-template-columns: 1.4fr 1fr 1fr;">
          <div class="hero-block">
            <div class="label">Qualified vs Target</div>
            <div class="value-row">
              <div class="value-big">${qualified}</div>
              <div class="value-target">/ ${target}</div>
            </div>
            <div class="badge">${badgeText}</div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-value">${sourced}</div>
            <div class="kpi-label">Sourced</div>
          </div>
          <div class="kpi-cell accent">
            <div class="kpi-value">${qualifyRate}%</div>
            <div class="kpi-label">Qualify Rate</div>
          </div>
        </div>

        <div style="padding: 14px 24px 0; display: flex; gap: 16px; align-items: center;">
          <div style="font-family: var(--font-display); font-weight: bold; font-size: 12px; color: var(--gs-gold); letter-spacing: 1.5px;">CHANNEL</div>
          <div class="inline-stat">
            📞 Phone Q: <span class="label-bold">${phoneQ}</span> <span style="color: var(--gs-faint);">(${phonePct}%)</span>
            &nbsp;·&nbsp;
            💬 Text Q: <span class="label-bold">${textQ}</span> <span style="color: var(--gs-faint);">(${textPct}%)</span>
          </div>
        </div>

        <div class="section">
          <h2>BY AGENT</h2>
          <table>
            <thead>
              <tr>
                <th>AGENT</th>
                <th class="num">SOURCED</th>
                <th class="num">PHONE Q</th>
                <th class="num">TEXT Q</th>
                <th class="num">TOTAL Q</th>
                <th class="num">RATE</th>
              </tr>
            </thead>
            <tbody>
              ${agents.map(a => `
                <tr>
                  <td class="label">${a.name}</td>
                  <td class="num">${a.sourced}</td>
                  <td class="num">${a.phone_q}</td>
                  <td class="num">${a.text_q}</td>
                  <td class="num highlight">${a.total_q}</td>
                  <td class="num gold">${a.rate}</td>
                </tr>
              `).join('')}
              <tr class="total">
                <td>TOTAL</td>
                <td class="num">${sourced}</td>
                <td class="num">${phoneQ}</td>
                <td class="num">${textQ}</td>
                <td class="num">${qualified}</td>
                <td class="num">${qualifyRate}%</td>
              </tr>
            </tbody>
          </table>
        </div>

        ${topCounties.length > 0 ? `
          <div class="section">
            <h2>TOP COUNTIES</h2>
            <div class="inline-stat">
              ${topCounties.map(c => `<span class="label-bold">${c.name}</span> ${c.count}`).join(' &nbsp;·&nbsp; ')}
              ${data.counties_other_count ? `<span style="color: var(--gs-faint);"> &nbsp;+ ${data.counties_other_count} counties producing 1-2 each</span>` : ''}
            </div>
          </div>
        ` : ''}

        ${renderFooter()}
      `);
    }

    function parseAgents(data, names) {
      const fullNames = {
        martina: 'Martina Misheal',
        maryam: 'Maryam Selim',
        ahmed: 'Ahmed Abdelbaset',
        juan: 'Juan Pablo Larrea'
      };
      return names.map(n => {
        const sourced = num(data, `${n}_sourced`);
        const phone = num(data, `${n}_phone_q`);
        const text = num(data, `${n}_text_q`);
        const total = phone + text;
        const rate = sourced > 0 ? ((total / sourced) * 100).toFixed(1) + '%' : '—';
        return {
          name: fullNames[n] || n.charAt(0).toUpperCase() + n.slice(1),
          sourced,
          phone_q: phone,
          text_q: text,
          total_q: total,
          rate
        };
      });
    }

    function parseTopCounties(data) {
      const counties = [];
      for (let i = 1; i <= 5; i++) {
        const name = data[`county_${i}_name`];
        if (!name) continue;
        counties.push({
          name,
          count: val(data, `county_${i}_count`, '0')
        });
      }
      return counties;
    }

    // Self-contained confetti (GoldSoil colors), drawn on a canvas over the card,
    // then removed when it finishes. Live-page only — a Slack screenshot won't catch it.
    function fireCelebration() {
      const card = document.querySelector('.card');
      if (!card) return;
      const prev = card.querySelector('#gs-confetti');
      if (prev) prev.remove();
      card.style.position = 'relative';
      const canvas = document.createElement('canvas');
      canvas.id = 'gs-confetti';
      canvas.style.cssText = 'position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:50;';
      card.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      const colors = ['#C4A22F', '#1A472A', '#e0c66a', '#8a9a8e'];
      const rect = () => card.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const r0 = rect();
      canvas.width = Math.max(1, Math.floor(r0.width * dpr));
      canvas.height = Math.max(1, Math.floor(r0.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const parts = [];
      for (let i = 0; i < 150; i++) {
        parts.push({
          x: r0.width * (0.1 + Math.random() * 0.8),
          y: r0.height + 10,
          vx: (Math.random() - 0.5) * 7,
          vy: -(7 + Math.random() * 8),
          g: 0.22 + Math.random() * 0.08,
          s: 4 + Math.random() * 5,
          rot: Math.random() * 6.28,
          vr: (Math.random() - 0.5) * 0.35,
          c: colors[(Math.random() * colors.length) | 0],
          life: 0, max: 95 + Math.random() * 45
        });
      }
      function tick() {
        const r = rect();
        ctx.clearRect(0, 0, r.width, r.height);
        let alive = false;
        for (const p of parts) {
          if (p.life > p.max) continue;
          p.life++; p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
          if (p.y < r.height + 50) alive = true;
          ctx.save();
          ctx.globalAlpha = Math.max(0, 1 - p.life / p.max);
          ctx.translate(p.x, p.y); ctx.rotate(p.rot);
          ctx.fillStyle = p.c;
          ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6);
          ctx.restore();
        }
        if (alive) requestAnimationFrame(tick);
        else { ctx.clearRect(0, 0, r.width, r.height); canvas.remove(); }
      }
      requestAnimationFrame(tick);
    }

    async function init() {
      const root = document.getElementById('root');
      root.innerHTML = renderLoading();

      if (SHEET_URL === "PASTE_LIM_CSV_URL_HERE") {
        root.innerHTML = renderError(
          "Sheet URL not yet configured. Open lim.html and paste your published CSV URL into SHEET_URL."
        );
        return;
      }

      try {
        const data = await loadSheetData(SHEET_URL + "&cb=" + Date.now());
        root.innerHTML = renderCard(data);
        if (GOALS_MET) requestAnimationFrame(fireCelebration);
      } catch (err) {
        root.innerHTML = renderError(err.message);
      }
    }

    init();
  </script>
</body>
</html>
