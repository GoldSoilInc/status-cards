<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Land Intake — GoldSoil Status</title>
  <link rel="stylesheet" href="shared/brand.css">
  <script src="shared/sheet-loader.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    // ============================================
    // LAND INTAKE (LIM) TEAM CARD
    // Phone -> Appointment funnel: Warm Transfers, Appts Set, Show-Up Rate.
    // Reads LIM_metrics (warm_transfers, appts, show_up_rate + per-agent).
    // warm_transfers_target = ROUND(SUM('Campaign Members'!D2:D)/600, 0)
    // delivery_rate / reply_rate from 'Delivery / Reply Rate' tab — own row below
    // By Agent; "Result at EOD" placeholder before the 5 PM slot.
    // ============================================
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMUBPWS464Rq_ID_Zjoj-PU5QuDeIj2PK6pSKV22rEZ8_0_zxjYagl4SYM3TZckmIkaxhyr_QtyUk9/pub?gid=1101423418&single=true&output=csv";

    const TEAM_NAME = "Land Intake Team";
    const TEAM_LEAD = "Juan";

    // Set true by renderCard when the Appts target is hit; gates the confetti.
    let GOALS_MET = false;

    function renderCard(data) {
      const agents = parseAgents(data, ['martina', 'maryam', 'ahmed', 'juan', 'nada', 'mina']);

      // ---- KPI values (today) ----
      const warmTransfers = num(data, 'warm_transfers');
      const apptsSet      = num(data, 'appts');
      const showUpRate    = val(data, 'show_up_rate', '0');

      // ---- Warm transfer target + % attained ----
      const wtTargetRaw = val(data, 'warm_transfers_target', '');
      const wtTarget = (wtTargetRaw !== '' && !isNaN(Number(wtTargetRaw))) ? Number(wtTargetRaw) : null;
      const wtPct = (wtTarget && wtTarget > 0) ? Math.round((warmTransfers / wtTarget) * 100) : null;

      // ---- Delivery / Reply rates: read always, color-coded value shown EOD only ----
      const isEOD = getCurrentTimeSlot() === '5pm';

      // ---- Targets (sheet-overridable; blank = TBD pill, no invented numbers) ----
      // Confetti fires only if appts_target is set AND met.
      const apptsTargetRaw = val(data, 'appts_target', '');
      const apptsTarget = (apptsTargetRaw !== '' && !isNaN(Number(apptsTargetRaw))) ? Number(apptsTargetRaw) : null;
      GOALS_MET = apptsTarget !== null && apptsSet >= apptsTarget;

      // Goal pill: gold while below, green when met, cream "TBD" until a target exists.
      const goalPill = (value, targetKey, isPct) => {
        const raw = val(data, targetKey, '');
        if (raw === '' || isNaN(Number(raw))) {
          return `<div style="display:inline-block; margin-top:6px; padding:2px 9px; border-radius:10px; background:var(--gs-cream); color:var(--gs-dark-green); border:0.5px solid var(--gs-gold); font-size:9px; font-weight:bold; letter-spacing:0.5px;">TBD</div>`;
        }
        const target = Number(raw);
        const met = Number(value) >= target;
        const label = isPct ? `GOAL ${target}%` : `GOAL ${target}`;
        return `<div style="display:inline-block; margin-top:6px; padding:2px 9px; border-radius:10px; background:${met ? 'var(--gs-dark-green)' : 'var(--gs-gold)'}; color:${met ? 'var(--gs-gold)' : 'var(--gs-dark-green)'}; font-size:9px; font-weight:bold; letter-spacing:0.5px;">${met ? '\u2713 ' : ''}${label}</div>`;
      };

      // % attained pill for Warm Transfers: gold while below 100, green when hit, cream TBD if no target.
      const pctPill = (pct) => {
        if (pct === null) {
          return `<div style="display:inline-block; margin-top:6px; padding:2px 9px; border-radius:10px; background:var(--gs-cream); color:var(--gs-dark-green); border:0.5px solid var(--gs-gold); font-size:9px; font-weight:bold; letter-spacing:0.5px;">TBD</div>`;
        }
        const met = pct >= 100;
        return `<div style="display:inline-block; margin-top:6px; padding:2px 9px; border-radius:10px; background:${met ? 'var(--gs-dark-green)' : 'var(--gs-gold)'}; color:${met ? 'var(--gs-gold)' : 'var(--gs-dark-green)'}; font-size:9px; font-weight:bold; letter-spacing:0.5px;">${met ? '\u2713 ' : ''}${pct}% OF TARGET</div>`;
      };

      // Traffic-light rate box (rendered in its own 2-box row below By Agent).
      // Before EOD, shows a "Result at EOD" placeholder. At EOD, shows the
      // color-coded value: < yellowMin = red, < greenMin = yellow, else green.
      const RATE_RED = '#B23A3A', RATE_YELLOW = '#C4A22F', RATE_GREEN = '#1A472A';
      const rateBox = (key, label, yellowMin, greenMin) => {
        if (!isEOD) {
          return `<div class="kpi-cell">
              <div class="kpi-value" style="color:var(--gs-faint); font-size:26px;">\u2014</div>
              <div class="kpi-label">${label}</div>
              <div style="display:inline-block; margin-top:6px; padding:2px 9px; border-radius:10px; background:var(--gs-cream); color:var(--gs-dark-green); border:0.5px solid var(--gs-gold); font-size:8.5px; font-weight:bold; letter-spacing:0.3px;">RESULT AT EOD</div>
            </div>`;
        }
        const raw = val(data, key, '');
        if (raw === '' || isNaN(Number(raw))) {
          return `<div class="kpi-cell">
              <div class="kpi-value" style="color:var(--gs-faint);">\u2014</div>
              <div class="kpi-label">${label}</div>
            </div>`;
        }
        const v = Number(raw);
        const color = v < yellowMin ? RATE_RED : (v < greenMin ? RATE_YELLOW : RATE_GREEN);
        return `<div class="kpi-cell">
            <div class="kpi-value" style="color:${color};">${v}%</div>
            <div class="kpi-label">${label}</div>
          </div>`;
      };

      return wrapCard(`
        ${renderHeader(TEAM_NAME, TEAM_LEAD)}
        ${renderTimeStrip(getCurrentTimeSlot())}

        <div class="kpi-strip" style="grid-template-columns: repeat(4, 1fr);">
          <div class="kpi-cell">
            <div class="kpi-value">${wtTarget !== null ? wtTarget : '\u2014'}</div>
            <div class="kpi-label">Warm Transfer Target</div>
          </div>
          <div class="kpi-cell">
            <div class="kpi-value">${warmTransfers}</div>
            <div class="kpi-label">Warm Transfers</div>
            ${pctPill(wtPct)}
          </div>
          <div class="kpi-cell accent">
            <div class="kpi-value">${apptsSet}</div>
            <div class="kpi-label">Appts Set</div>
            ${goalPill(apptsSet, 'appts_target', false)}
          </div>
          <div class="kpi-cell hero">
            <div class="kpi-value">${showUpRate}%</div>
            <div class="kpi-label">Show-Up Rate</div>
            ${goalPill(showUpRate, 'show_up_rate_target', true)}
          </div>
        </div>

        <div class="section">
          <h2>BY AGENT</h2>
          <table>
            <thead>
              <tr>
                <th>AGENT</th>
                <th class="num">WARM TRANSFERS</th>
                <th class="num">APPTS</th>
                <th class="num">SHOW-UP</th>
              </tr>
            </thead>
            <tbody>
              ${agents.map(a => `
                <tr>
                  <td class="label">${a.name}</td>
                  <td class="num">${a.warm_transfers}</td>
                  <td class="num highlight">${a.appts}</td>
                  <td class="num gold">${a.show_up_rate}%</td>
                </tr>
              `).join('')}
              <tr class="total">
                <td>TOTAL</td>
                <td class="num">${warmTransfers}</td>
                <td class="num">${apptsSet}</td>
                <td class="num">${showUpRate}%</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="kpi-strip" style="grid-template-columns: repeat(2, 1fr);">
          ${rateBox('delivery_rate', 'Delivery Rate', 80, 85)}
          ${rateBox('reply_rate', 'Reply Rate', 7, 10)}
        </div>

        ${renderFooter()}
      `);
    }

    // Per-agent counts keyed off the Sourcer (Phone) column in each new tab.
    // Full names must match the value in that column exactly for COUNTIF to land.
    function parseAgents(data, names) {
      const fullNames = {
        martina: 'Martina Misheal',
        maryam: 'Maryam Selim',
        ahmed: 'Ahmed Abdelbaset',
        juan: 'Juan Pablo Larrea',
        nada: 'Nada Ahmed',
        mina: 'Mina Kamal'
      };
      return names.map(n => ({
        name: fullNames[n] || n.charAt(0).toUpperCase() + n.slice(1),
        warm_transfers: num(data, `${n}_warm_transfers`),
        appts: num(data, `${n}_appts`),
        show_up_rate: val(data, `${n}_show_up_rate`, '0')
      }));
    }

    // Self-contained confetti (GoldSoil colors), drawn on a canvas over the card,
    // then removed when it finishes. Live-page only — a Slack screenshot won't catch it.
    function fireCelebration() {
      const card = document.querySelector('.card');
      if (!card) return;
      const prev = card.querySelector('#gs-confetti');
      if (prev) prev.remove();
      card.style.position = 'relative';
      const canvas = document.createElement('canvas');
      canvas.id = 'gs-confetti';
      canvas.style.cssText = 'position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:50;';
      card.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      const colors = ['#C4A22F', '#1A472A', '#e0c66a', '#8a9a8e'];
      const rect = () => card.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const r0 = rect();
      canvas.width = Math.max(1, Math.floor(r0.width * dpr));
      canvas.height = Math.max(1, Math.floor(r0.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const parts = [];
      for (let i = 0; i < 150; i++) {
        parts.push({
          x: r0.width * (0.1 + Math.random() * 0.8),
          y: r0.height + 10,
          vx: (Math.random() - 0.5) * 7,
          vy: -(7 + Math.random() * 8),
          g: 0.22 + Math.random() * 0.08,
          s: 4 + Math.random() * 5,
          rot: Math.random() * 6.28,
          vr: (Math.random() - 0.5) * 0.35,
          c: colors[(Math.random() * colors.length) | 0],
          life: 0, max: 95 + Math.random() * 45
        });
      }
      function tick() {
        const r = rect();
        ctx.clearRect(0, 0, r.width, r.height);
        let alive = false;
        for (const p of parts) {
          if (p.life > p.max) continue;
          p.life++; p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
          if (p.y < r.height + 50) alive = true;
          ctx.save();
          ctx.globalAlpha = Math.max(0, 1 - p.life / p.max);
          ctx.translate(p.x, p.y); ctx.rotate(p.rot);
          ctx.fillStyle = p.c;
          ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6);
          ctx.restore();
        }
        if (alive) requestAnimationFrame(tick);
        else { ctx.clearRect(0, 0, r.width, r.height); canvas.remove(); }
      }
      requestAnimationFrame(tick);
    }

    async function init() {
      const root = document.getElementById('root');
      root.innerHTML = renderLoading();

      try {
        const data = await loadSheetData(SHEET_URL + "&cb=" + Date.now());
        root.innerHTML = renderCard(data);
        if (GOALS_MET) requestAnimationFrame(fireCelebration);
      } catch (err) {
        root.innerHTML = renderError(err.message);
      }
    }

    init();
  </script>
</body>
</html>
