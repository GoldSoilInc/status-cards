<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales — GoldSoil Status</title>
  <link rel="stylesheet" href="shared/brand.css">
  <script src="shared/sheet-loader.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    // ============================================
    // SALES TEAM CARD
    // ============================================
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMUBPWS464Rq_ID_Zjoj-PU5QuDeIj2PK6pSKV22rEZ8_0_zxjYagl4SYM3TZckmIkaxhyr_QtyUk9/pub?gid=332866919&single=true&output=csv";

    const TEAM_NAME = "Sales Team";
    const TEAM_LEAD = "Jose / Gabriel";

    function renderCard(data) {
      const people = parsePeople(data, ['jose', 'gabriel']);
      const sources = parseList(data['top_sources'], 2);
      const campaigns = parseList(data['campaigns_today'], 4);

      return wrapCard(`
        ${renderHeader(TEAM_NAME, TEAM_LEAD)}
        ${renderTimeStrip(getCurrentTimeSlot())}

        <div class="kpi-strip" style="grid-template-columns: repeat(3, 1fr);">
          <div class="kpi-cell">
            <div class="kpi-value">${val(data, 'sourced', '0')}</div>
            <div class="kpi-label">Sourced</div>
          </div>
          <div class="kpi-cell accent">
            <div class="kpi-value">${val(data, 'appt_set', '0')}</div>
            <div class="kpi-label">Appt Set</div>
          </div>
          <div class="kpi-cell hero">
            <div class="kpi-value">${val(data, 'qualified', '0')}</div>
            <div class="kpi-label">Qualified</div>
          </div>
        </div>

        <div style="padding: 14px 24px 0;">
          <div style="display: flex; gap: 14px; align-items: center; font-family: var(--font-body); font-size: 12px;">
            <span style="color: var(--gs-faint); font-family: var(--font-display); font-size: 10px; letter-spacing: 1.5px;">PIPELINE</span>
            <span><span class="label-bold">${val(data, 'negotiation', '0')}</span> Negotiation</span>
            <span style="color: var(--gs-border-soft);">·</span>
            <span><span class="label-bold">${val(data, 'contract_sent', '0')}</span> Contract Sent</span>
            <span style="color: var(--gs-border-soft);">·</span>
            <span><span class="label-bold">${val(data, 'uc_wo_emd', '0')}</span> UC w/o EMD</span>
            <span style="color: var(--gs-border-soft);">·</span>
            <span><span class="label-bold">${val(data, 'uc_w_emd', '0')}</span> UC w/ EMD</span>
          </div>
        </div>

        <div class="section">
          <h2>LEADS BY SOURCE</h2>
          ${sources.length > 0 ? `
            <table>
              <thead>
                <tr>
                  <th>SOURCE</th>
                  <th class="num">LEADS TODAY</th>
                </tr>
              </thead>
              <tbody>
                ${sources.map(s => `
                  <tr>
                    <td class="label">${s[0]}</td>
                    <td class="num highlight">${s[1]}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          ` : `<div class="empty-state">No leads sourced yet today.</div>`}
        </div>

        <div class="section">
          <h2>CAMPAIGNS & COUNTIES WORKED TODAY</h2>
          ${campaigns.length > 0 ? `
            <table>
              <thead>
                <tr>
                  <th>LISTING</th>
                  <th>STATE</th>
                  <th>COUNTY</th>
                  <th class="num">LEADS</th>
                </tr>
              </thead>
              <tbody>
                ${campaigns.map(c => `
                  <tr>
                    <td class="label">${c[0]}</td>
                    <td>${c[1]}</td>
                    <td>${c[2]}</td>
                    <td class="num highlight">${c[3]}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          ` : `<div class="empty-state">No campaign activity yet today.</div>`}
        </div>

        <div class="section">
          <h2>BY PERSON · TODAY</h2>
          <table>
            <thead>
              <tr>
                <th>PERSON</th>
                <th class="num">SOURCED</th>
                <th class="num">APPT SET</th>
                <th class="num">QUALIFIED</th>
                <th class="num">UC W/ EMD</th>
              </tr>
            </thead>
            <tbody>
              ${people.map(p => `
                <tr>
                  <td class="label">${p.name}</td>
                  <td class="num">${p.sourced}</td>
                  <td class="num">${p.appt_set}</td>
                  <td class="num highlight">${p.qualified}</td>
                  <td class="num">${p.uc_w_emd}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        ${renderFlags(val(data, 'flags', ''))}
        ${renderFooter()}
      `);
    }

    // Parse a multi-line " · " separated list into an array of N-element arrays.
    // expectedFields = how many "·"-separated fields per line.
    function parseList(raw, expectedFields) {
      if (!raw || !raw.trim()) return [];
      return raw.split('\n')
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .map(line => {
          const parts = line.split('·').map(p => p.trim());
          // Pad to expectedFields if short
          while (parts.length < expectedFields) parts.push('—');
          return parts;
        });
    }

    function parsePeople(data, names) {
      return names.map(n => ({
        name: n.charAt(0).toUpperCase() + n.slice(1),
        sourced: val(data, `${n}_sourced`, '0'),
        appt_set: val(data, `${n}_appt_set`, '0'),
        qualified: val(data, `${n}_qualified`, '0'),
        uc_w_emd: val(data, `${n}_uc_w_emd`, '0')
      }));
    }

    async function init() {
      const root = document.getElementById('root');
      root.innerHTML = renderLoading();

      try {
        const data = await loadSheetData(SHEET_URL);
        root.innerHTML = renderCard(data);
      } catch (err) {
        root.innerHTML = renderError(err.message);
      }
    }

    init();
  </script>
</body>
</html>
